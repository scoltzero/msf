name: Release

on:
  push:
    branches:
      - main
      - webui-rebuild
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.2.3 or 0.2.3"
        required: true
        type: string
      overwrite_release:
        description: "Overwrite an existing release/tag with the same version"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      overwrite_release: ${{ steps.release.outputs.overwrite_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          should_release=false
          version=""
          tag=""
          overwrite_release="false"

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v*.*.* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            should_release=true
            overwrite_release=true
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
            version="${version#v}"
            version="$(echo "${version}" | xargs)"
            tag="v${version}"
            should_release=true
            overwrite_release="${{ github.event.inputs.overwrite_release }}"
          else
            # Branch push release markers:
            #   release: v0.2.3
            #   release v0.2.3
            #   [release v0.2.3]
            message="$(git show -s --format=%B "${GITHUB_SHA}")"
            release_marker="$(printf '%s\n' "${message}" | grep -Eio '(^|[[:space:]\[])release[[:space:]:：]+v?[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?' | head -n 1 || true)"
            if [[ -n "${release_marker}" ]]; then
              version="$(printf '%s' "${release_marker}" | grep -Eo 'v?[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$' | sed 's/^v//')"
              tag="v${version}"
              should_release=true
              overwrite_release=true
            fi
          fi

          if [[ "${should_release}" == "true" ]]; then
            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid version: ${version}" >&2
              exit 1
            fi
            echo "Resolved release ${tag} from ${GITHUB_SHA}"
          else
            echo "No release marker found. Skipping release build."
          fi

          {
            echo "should_release=${should_release}"
            echo "version=${version}"
            echo "tag=${tag}"
            echo "overwrite_release=${overwrite_release}"
          } >> "${GITHUB_OUTPUT}"

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      GITHUB_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run tests
        run: go test ./...

      - name: Build linux amd64 package
        run: make package VERSION="${VERSION}" GOOS=linux GOARCH=amd64

      - name: Build linux arm64 package
        run: make package VERSION="${VERSION}" GOOS=linux GOARCH=arm64

      - name: Build Unraid plugin package
        run: make unraid VERSION="${VERSION}" UNRAID_VERSION="${VERSION}" GITHUB_REPO="${GITHUB_REPO}" RELEASE_TAG="${RELEASE_TAG}" GOOS=linux GOARCH=amd64

      - name: Create legacy linux asset aliases
        shell: bash
        run: |
          set -euo pipefail
          cp dist/msf-linux-amd64.tar.gz dist/msm-free-linux-amd64.tar.gz
          cp dist/msf-linux-arm64.tar.gz dist/msm-free-linux-arm64.tar.gz

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum msf-linux-amd64.tar.gz > msf-linux-amd64.tar.gz.sha256
          sha256sum msf-linux-arm64.tar.gz > msf-linux-arm64.tar.gz.sha256
          sha256sum msm-free-linux-amd64.tar.gz > msm-free-linux-amd64.tar.gz.sha256
          sha256sum msm-free-linux-arm64.tar.gz > msm-free-linux-arm64.tar.gz.sha256
          sha256sum "unraid/msf-${VERSION}-x86_64-1.txz" > "unraid/msf-${VERSION}-x86_64-1.txz.sha256"
          sha256sum unraid/msf.plg > unraid/msf.plg.sha256
          sha256sum -c msf-linux-amd64.tar.gz.sha256
          sha256sum -c msf-linux-arm64.tar.gz.sha256
          sha256sum -c msm-free-linux-amd64.tar.gz.sha256
          sha256sum -c msm-free-linux-arm64.tar.gz.sha256
          sha256sum -c "unraid/msf-${VERSION}-x86_64-1.txz.sha256"
          sha256sum -c unraid/msf.plg.sha256

      - name: Verify binary architectures
        run: |
          set -euo pipefail
          file dist/msf-linux-amd64 | grep -Eq 'x86-64|x86_64'
          file dist/msf-linux-arm64 | grep -Eq 'ARM aarch64|aarch64'

      - name: Create or update release tag
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${{ needs.prepare.outputs.overwrite_release }}" == "true" ]]; then
            git tag -f -a "${RELEASE_TAG}" -m "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push --force origin "refs/tags/${RELEASE_TAG}"
          else
            git tag -a "${RELEASE_TAG}" -m "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Build release notes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/msf-release-notes.md
          import pathlib
          import re
          import os

          version = os.environ["VERSION"]
          changelog = pathlib.Path("CHANGELOG.md")
          text = changelog.read_text(encoding="utf-8") if changelog.exists() else ""
          heading = re.compile(rf"^##\s+v?{re.escape(version)}(?:\s|$)", re.M)
          match = heading.search(text)
          if not match:
              print(f"## v{version}")
              print()
              print("- 自动构建发布。")
              raise SystemExit
          start = match.start()
          next_match = re.search(r"^##\s+", text[match.end():], re.M)
          end = match.end() + next_match.start() if next_match else len(text)
          print(text[start:end].strip())
          PY
          cat /tmp/msf-release-notes.md

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            "dist/msf-linux-amd64.tar.gz"
            "dist/msf-linux-amd64.tar.gz.sha256"
            "dist/msf-linux-arm64.tar.gz"
            "dist/msf-linux-arm64.tar.gz.sha256"
            "dist/msm-free-linux-amd64.tar.gz"
            "dist/msm-free-linux-amd64.tar.gz.sha256"
            "dist/msm-free-linux-arm64.tar.gz"
            "dist/msm-free-linux-arm64.tar.gz.sha256"
            "dist/unraid/msf-${VERSION}-x86_64-1.txz"
            "dist/unraid/msf-${VERSION}-x86_64-1.txz.sha256"
            "dist/unraid/msf.plg"
            "dist/unraid/msf.plg.sha256"
          )

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file /tmp/msf-release-notes.md
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --title "${RELEASE_TAG}" \
              --notes-file /tmp/msf-release-notes.md \
              --target "${GITHUB_SHA}"
          fi

      - name: Sync root Unraid plugin manifest
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          manifest="$(mktemp)"
          cp dist/unraid/msf.plg "${manifest}"

          worktree="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "${worktree}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git fetch origin "${DEFAULT_BRANCH}"
          git worktree add --detach "${worktree}" "origin/${DEFAULT_BRANCH}"
          cp "${manifest}" "${worktree}/msf.plg"

          cd "${worktree}"
          if git diff --quiet -- msf.plg; then
            echo "root msf.plg already matches release asset"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add msf.plg
          git commit -m "Update msf Unraid plugin manifest for ${RELEASE_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
